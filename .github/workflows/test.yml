name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: python -m compileall -q src tests
